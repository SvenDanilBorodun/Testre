name: CI

# Triggered on every push + PR to main. Runs Python unit tests, syntax-
# checks every shell + compose file, and validates that the overlay
# patch script's regex still matches upstream shape.
#
# Does NOT build images or run the full docker-compose (needs privileged
# + hardware). That still happens on the maintainer's workstation via
# `robotis_ai_setup/docker/build-images.sh`, but CI catches drift early.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: Syntax-check Python modules
        run: |
          python -m compileall -q \
            robotis_ai_setup/gui \
            robotis_ai_setup/scripts \
            robotis_ai_setup/cloud_training_api \
            robotis_ai_setup/modal_training \
            robotis_ai_setup/docker/physical_ai_server/overlays \
            robotis_ai_setup/docker/physical_ai_server/patches
      - name: Unit tests
        run: |
          cd robotis_ai_setup
          python -m unittest discover -s tests -v

      - name: Cloud API unit tests (workgroups + dataset sweep)
        # Tests stub fastapi/supabase/huggingface_hub via sys.modules so
        # they run without the heavy deps. They cover the workgroup
        # helper, dataset-sweep parsers, and the audit-table fallback
        # logic. Integration tests against a real Supabase branch are a
        # follow-up when test infrastructure is in place — see plan
        # Part 5 §3 (concurrency check).
        run: |
          cd robotis_ai_setup/cloud_training_api
          # Inject env required by app/main.py's startup validators
          # (validates these are set, but the test target doesn't import
          # main.py so this is just defensive consistency).
          export SUPABASE_URL=http://ci.test
          export SUPABASE_SERVICE_ROLE_KEY=ci_test
          export MODAL_TOKEN_ID=ci_test
          export MODAL_TOKEN_SECRET=ci_test
          python -m unittest discover -s app/tests -v

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: |
          # Lint every *.sh file but tolerate known upstream shell quirks
          # via -e. Fail the job on error-level findings only.
          shellcheck -S error \
            robotis_ai_setup/docker/build-images.sh \
            robotis_ai_setup/docker/open_manipulator/entrypoint_omx.sh \
            robotis_ai_setup/wsl_rootfs/build_rootfs.sh \
            robotis_ai_setup/wsl_rootfs/start-dockerd.sh \
            physical_ai_tools/physical_ai_manager/scripts/railway-deploy.sh

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: |
          cd robotis_ai_setup/docker
          # Feed fake .env values so variable substitution doesn't fail;
          # we only care about YAML + service-shape validation.
          cat > .env <<'EOF'
          FOLLOWER_PORT=/dev/ttyACM0
          LEADER_PORT=/dev/ttyACM1
          CAMERA_DEVICE_1=/dev/video0
          CAMERA_NAME_1=gripper
          CAMERA_DEVICE_2=/dev/video2
          CAMERA_NAME_2=scene
          ROS_DOMAIN_ID=30
          REGISTRY=nettername
          EOF
          docker compose --env-file .env config > /dev/null
          docker compose --env-file .env -f docker-compose.yml -f docker-compose.gpu.yml config > /dev/null

  overlay-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch script self-check
        run: |
          # Prove the patch script still exits non-zero on a no-op.
          # Feed it a file that doesn't contain the substitution target —
          # patch should refuse with code 2 (fix 1 post-check failed).
          mkdir -p /tmp/fake
          cat > /tmp/fake/server_inference.py <<'EOF'
          # Intentionally unrelated file
          class X:
              def __init__(self):
                  self.unrelated = True
          EOF
          set +e
          python robotis_ai_setup/docker/physical_ai_server/patches/fix_server_inference.py \
              /tmp/fake/server_inference.py
          rc=$?
          set -e
          if [ "$rc" = "0" ]; then
              echo "Patch script should have exited non-zero on a file missing the patch target."
              exit 1
          fi
          echo "Patch script correctly rejected unrelated input (rc=$rc)"

  modal-import-validate:
    # Imports both Modal apps to catch SDK API misuse at module load —
    # exactly the class of bug that bit us with vision_app.py using
    # `force_reinstall=True` (rejected by Modal SDK 1.4.2; the working
    # kwarg is `extra_options="--force-reinstall"`). `python -m compileall`
    # only parses; the Image.pip_install(...) call has to actually
    # *execute* for the bad kwarg to raise TypeError. Importing the
    # module triggers that execution because both apps build their
    # Image specs at module scope.
    #
    # Modal credentials are NOT required — Image specs and
    # Secret.from_name(...) are deferred references that don't reach
    # the Modal API until deploy time. We install the SDK from PyPI
    # and verify the modules import cleanly.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Modal SDK
        # Pin the major version we deploy with. A future SDK that
        # silently renames a kwarg back is exactly what we want this
        # job to catch.
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'modal>=1.4,<2'
      - name: Import every Modal app
        # Import each *.py under modal_training/ that defines a
        # modal.App. Failures during Image / function decoration
        # surface as ImportError/TypeError here and fail the build —
        # exactly the c56c012 vision_app.py near-miss with the bad
        # force_reinstall= kwarg.
        #
        # training_handler.py is intentionally NOT in this sweep —
        # it imports server-side runtime deps (supabase,
        # huggingface_hub.utils.HfHubHTTPError) that only exist inside
        # the Modal container's image. It's already syntax-checked by
        # python-tests via compileall.
        working-directory: robotis_ai_setup/modal_training
        run: |
          set -e
          for f in modal_app.py vision_app.py; do
            echo "== importing $f =="
            python -c "import importlib.util, sys; spec = importlib.util.spec_from_file_location('m', '$f'); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print('  OK: import succeeded')"
          done

  teacher-web-build-validate:
    # Builds Dockerfile.web exactly the way Railway's `railway up
    # --path-as-root .` build does — with only physical_ai_manager/ as
    # the build context — so any path-scope regression surfaces in CI
    # instead of as a failed Railway deploy. The original case:
    # Dockerfile.web's `npm run build` triggers a Jest `prebuild` that
    # reads coco_classes.py from a sibling-repo path; the file isn't
    # in the build context, the test fails, the build fails. The
    # graceful-skip in objectClasses.sync.test.js is the local defence;
    # this job is the systemic one.
    #
    # NOTE: we deliberately do NOT stage `_coco_classes.py` here — the
    # whole point is to test the Railway-equivalent context. With the
    # graceful-skip, the prebuild test skips and the build succeeds.
    # The sister job `manager-build-validate` already builds the
    # student Dockerfile WITH staging, so dropdown↔server drift is
    # still enforced.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build physical_ai_manager via Dockerfile.web (Railway path)
        run: |
          docker build \
            --build-arg REACT_APP_SUPABASE_URL=https://CI_VALIDATE.supabase.co \
            --build-arg REACT_APP_SUPABASE_ANON_KEY=CI_VALIDATE_ANON_KEY \
            --build-arg REACT_APP_CLOUD_API_URL=https://CI_VALIDATE.api.example \
            --build-arg REACT_APP_BUILD_ID=ci-railway-validate \
            -t edubotics-teacher-web-validate \
            -f physical_ai_tools/physical_ai_manager/Dockerfile.web \
            physical_ai_tools/physical_ai_manager/
      - name: Assert placeholder secrets reached the bundle
        run: |
          for needle in \
            'CI_VALIDATE.supabase.co' \
            'CI_VALIDATE_ANON_KEY' \
            'CI_VALIDATE.api.example' ; do
              if ! docker run --rm --entrypoint sh edubotics-teacher-web-validate -c \
                   "grep -q -F '$needle' /usr/share/nginx/html/static/js/main.*.js" ; then
                  echo "FAIL: '$needle' not found in built bundle"
                  exit 1
              fi
              echo "OK: '$needle' present"
          done

  manager-build-validate:
    # Catches the white-screen regression that shipped on 4 published
    # tags before we noticed: a build where REACT_APP_SUPABASE_URL etc.
    # weren't passed as build-args, so the React bundle inlined undefined,
    # supabaseClient.js threw at module load, and every student saw a
    # blank page. Build the manager image with placeholder secrets and
    # assert those exact strings made it into main.*.js — if they didn't,
    # Webpack didn't see the env vars and the image is broken.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build physical_ai_manager with placeholder secrets
        run: |
          # Stage the same coco_classes.py snapshot that build-images.sh
          # stages, so the prebuild Jest hook
          # (src/components/Workshop/blocks/__tests__/objectClasses.sync.test.js)
          # can run inside the build context.
          cp physical_ai_tools/physical_ai_server/physical_ai_server/workflow/coco_classes.py \
             physical_ai_tools/physical_ai_manager/_coco_classes.py
          docker build \
            --build-arg REACT_APP_SUPABASE_URL=https://CI_VALIDATE.supabase.co \
            --build-arg REACT_APP_SUPABASE_ANON_KEY=CI_VALIDATE_ANON_KEY \
            --build-arg REACT_APP_CLOUD_API_URL=https://CI_VALIDATE.api.example \
            --build-arg REACT_APP_BUILD_ID=ci-validate \
            -t edubotics-manager-validate \
            -f physical_ai_tools/physical_ai_manager/Dockerfile \
            physical_ai_tools/physical_ai_manager/
          rm -f physical_ai_tools/physical_ai_manager/_coco_classes.py
      - name: Assert placeholder secrets reached the React bundle
        run: |
          # Each placeholder must appear as a string literal in main.*.js.
          # If Webpack didn't inline process.env.REACT_APP_SUPABASE_URL,
          # the URL is absent and only the library's defensive throw
          # ("supabaseUrl is required") is in the bundle — exactly the
          # bug we're guarding against.
          for needle in \
            'CI_VALIDATE.supabase.co' \
            'CI_VALIDATE_ANON_KEY' \
            'CI_VALIDATE.api.example' ; do
              if ! docker run --rm --entrypoint sh edubotics-manager-validate -c \
                   "grep -q -F '$needle' /usr/share/nginx/html/static/js/main.*.js" ; then
                  echo "FAIL: '$needle' not found in built bundle — Webpack did not inline its env var."
                  echo "      Likely the Dockerfile dropped the ARG, or the React app stopped importing the var."
                  exit 1
              fi
              echo "OK: '$needle' found in bundle."
          done
      - name: Assert version.json is present + well-formed
        run: |
          docker run --rm --entrypoint sh edubotics-manager-validate -c \
            'cat /usr/share/nginx/html/version.json' | python3 -c \
            'import json,sys; d=json.load(sys.stdin); assert d["buildId"]=="ci-validate", d; print("version.json OK:", d)'

  tutorials-validate:
    # Walks every public/tutorials/*.json and asserts schema:
    # id/title_de/level/steps present, each step has title/body/
    # allowed_blocks. Cross-checks every allowed_blocks entry against
    # the cloud_training_api validator's ALLOWED_BLOCK_TYPES so a
    # tutorial can't reference a block the server would reject.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate tutorial JSON files
        run: |
          python3 - <<'PY'
          import glob, json, re, sys
          # Pull the allowlist from the validator's source so a single
          # change in validators/workflow.py covers both the runtime
          # gate and this CI check.
          src = open('robotis_ai_setup/cloud_training_api/app/validators/workflow.py').read()
          m = re.search(r'ALLOWED_BLOCK_TYPES[^=]*=\s*frozenset\(\{([^}]+)\}\)', src, re.S)
          assert m, 'could not locate ALLOWED_BLOCK_TYPES'
          allowed = set(re.findall(r'"([^"]+)"', m.group(1)))
          errs = []
          for path in sorted(glob.glob('physical_ai_tools/physical_ai_manager/public/tutorials/*.json')):
              try:
                  doc = json.load(open(path, encoding='utf-8'))
              except Exception as e:
                  errs.append(f'{path}: invalid JSON ({e})')
                  continue
              for field in ('id', 'title_de', 'level', 'steps'):
                  if field not in doc:
                      errs.append(f'{path}: missing field {field}')
              steps = doc.get('steps') or []
              if not isinstance(steps, list) or not steps:
                  errs.append(f'{path}: empty steps')
                  continue
              for i, step in enumerate(steps):
                  for field in ('title', 'body', 'allowed_blocks'):
                      if field not in step:
                          errs.append(f'{path} step {i+1}: missing {field}')
                  for blk in step.get('allowed_blocks') or []:
                      if blk not in allowed:
                          errs.append(f'{path} step {i+1}: block {blk!r} not in ALLOWED_BLOCK_TYPES')
          if errs:
              print('\n'.join(errs))
              sys.exit(1)
          print('Tutorials validate OK')
          PY

  interfaces-validate:
    # Sanity-checks every srv/msg file in physical_ai_interfaces:
    # exactly one --- separator per srv, every file listed in
    # CMakeLists.txt. No actual rosidl run (requires the full ROS
    # toolchain) but the file-level invariants catch typos.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint srv/msg files
        run: |
          python3 - <<'PY'
          import glob, os, re, sys
          errs = []
          srv_dir = 'physical_ai_tools/physical_ai_interfaces/srv'
          msg_dir = 'physical_ai_tools/physical_ai_interfaces/msg'
          cmake = open('physical_ai_tools/physical_ai_interfaces/CMakeLists.txt').read()
          for path in sorted(glob.glob(f'{srv_dir}/*.srv')):
              body = open(path, encoding='utf-8').read()
              # rosidl srv format: one line that is exactly '---'
              # separates request from response. Count those lines
              # (ignore '---' that appears inside comments or string
              # defaults).
              sep_lines = [
                  ln for ln in body.splitlines() if ln.strip() == '---'
              ]
              if len(sep_lines) != 1:
                  errs.append(f'{path}: expected exactly one ---, found {len(sep_lines)}')
              base = os.path.basename(path)
              if f'srv/{base}' not in cmake:
                  errs.append(f'{path}: not listed in CMakeLists.txt')
          for path in sorted(glob.glob(f'{msg_dir}/*.msg')):
              base = os.path.basename(path)
              if f'msg/{base}' not in cmake:
                  errs.append(f'{path}: not listed in CMakeLists.txt')
          if errs:
              print('\n'.join(errs))
              sys.exit(1)
          print('Interfaces validate OK')
          PY

  nginx-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nginx + envsubst
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx-light gettext-base
      - name: nginx -t on web template
        run: |
          # Render the template with a concrete $PORT (the only var the
          # template references). Drop our config into sites-enabled and
          # let nginx validate it the way it would at container start.
          # Catches bad add_header syntax, missing semicolons, malformed
          # location blocks etc. before they break the Railway web deploy.
          export PORT=8080
          envsubst '$PORT' \
            < physical_ai_tools/physical_ai_manager/nginx.web.conf.template \
            > /tmp/nginx.web.conf
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo cp /tmp/nginx.web.conf /etc/nginx/sites-enabled/edubotics-web.conf
          sudo nginx -t
      - name: nginx -t on student template
        run: |
          # The student-mode nginx.conf is plain (no PORT envsubst), so
          # we drop it in directly. Same goal: catch syntax drift before
          # it hits the Docker image.
          sudo rm -f /etc/nginx/sites-enabled/edubotics-web.conf
          sudo cp physical_ai_tools/physical_ai_manager/nginx.conf \
            /etc/nginx/sites-enabled/edubotics-student.conf
          sudo nginx -t

  german-strings-lint:
    # Audit Tier-6: catch ae/oe/ue/ss transliterations inside any
    # [FEHLER] / [WARNUNG] / [STOPP] line in student-facing source.
    # CLAUDE.md §1.1 mandates literal ä/ö/ü/ß for every German string
    # the user reads; the drift accumulated silently across the
    # overlays + GUI + installer. This job is the regression fence.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan student-facing German strings for transliterations
        run: |
          set -e
          # Restrict to surfaces the student/teacher actually reads:
          #   - overlay layer (logs the user sees in TaskStatus / browser)
          #   - GUI tkinter strings
          #   - installer PowerShell strings
          # Skip code comments and docs (English/maintainer surfaces) by
          # only checking lines that contain a German marker prefix.
          # 'ss' false-positives on words like 'class' / 'pass' / 'less'
          # so we exclude common false-positives and only match obvious
          # German transliterations.
          OFFENDERS=$(grep -rnE \
            "(\[FEHLER\]|\[WARNUNG\]|\[STOPP\]).*\b(frueh|kuerzer|schliessen|Zeitluecken|Groesste|Luecken|Moegliche|ueber[a-z]|laeuft|haengt|pruefen|Pruefung|ueberschritten|Schueler|benoetigen|Oberflaeche|uebersprungen|enthaelt|zusaetzliche|Verfuegbar|geaendert|beschaedigt|koennte|faehige|Bildaufloesung)\b" \
            robotis_ai_setup/docker/physical_ai_server/overlays/ \
            robotis_ai_setup/gui/ \
            robotis_ai_setup/installer/ \
            2>/dev/null || true)
          if [ -n "$OFFENDERS" ]; then
            echo "::error::German transliterations found in student-facing strings."
            echo "Use literal ä/ö/ü/ß instead of ae/oe/ue/ss (CLAUDE.md §1.1)."
            echo ""
            echo "$OFFENDERS"
            exit 1
          fi
          echo "German strings clean."
