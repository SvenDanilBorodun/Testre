/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster

      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

/**:
  arm_controller:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - gripper_joint_1

      interface_name: position

      command_interfaces:
        - position

      state_interfaces:
        - position
        - velocity

      allow_partial_joints_goal: true

      # Per-joint limits on commanded velocity and acceleration. Without
      # these a bad trajectory (e.g. a diverging policy asking for
      # positions = [3.0] with time_from_start = 0.05s ⇒ ~60 rad/s) is
      # forwarded to the Dynamixels unchecked and the servos stall /
      # overheat. Values are conservative and suit typical manipulation.
      constraints:
        stopped_velocity_tolerance: 0.05  # rad/s
        goal_time: 1.0  # slack on overall trajectory timing
        joint1: { trajectory: 0.15, goal: 0.05 }
        joint2: { trajectory: 0.15, goal: 0.05 }
        joint3: { trajectory: 0.15, goal: 0.05 }
        joint4: { trajectory: 0.15, goal: 0.05 }
        joint5: { trajectory: 0.15, goal: 0.05 }
        gripper_joint_1: { trajectory: 0.1, goal: 0.05 }
