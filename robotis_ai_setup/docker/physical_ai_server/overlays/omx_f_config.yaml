physical_ai_server:
  ros__parameters:
    omx_f:
      observation_list:
        - gripper
        - scene
        - state

      camera_topic_list:
        - gripper:/gripper/image_raw/compressed
        - scene:/scene/image_raw/compressed

      joint_topic_list:
        - follower:/joint_states
        - leader:/leader/joint_trajectory

      joint_list:
        - leader

      joint_order:
        leader:
          - joint1
          - joint2
          - joint3
          - joint4
          - joint5
          - gripper_joint_1

      # Safety envelope tightened for OMX-F:
      #   joint1 (waist):     +/- pi/2  (was +/- pi)  — prevents cable wrap
      #                                                  on a misbehaving policy
      #   joint2 (shoulder):  +/- pi/2  (matches xacro Min/Max Position Limit)
      #   joint3 (elbow):     +/- pi/2  (matches xacro Min/Max Position Limit)
      #   joint4 (wrist 1):   +/- 0.85*pi (was +/- pi) — leaves headroom but
      #                                                  rejects full revolutions
      #   joint5 (wrist 2):   +/- 0.85*pi (was +/- pi) — same reasoning
      #   gripper_joint_1:    +/- 1.0   (unchanged)
      # Without these, joints 1/4/5 had no xacro Min/Max Position Limit and
      # the envelope allowed +/- pi (one revolution) — a policy emitting
      # multi-turn intent could spin those servos until the harness binds.
      safety_envelope:
        joint_min: [-1.5707963267948966, -1.5707963267948966, -1.5707963267948966, -2.6703537555513241, -2.6703537555513241, -1.0]
        joint_max: [1.5707963267948966, 1.5707963267948966, 1.5707963267948966, 2.6703537555513241, 2.6703537555513241, 1.0]
        max_delta_per_tick_at_30hz: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3]
