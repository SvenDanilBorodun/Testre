physical_ai_server:
  ros__parameters:
    omx_f:
      observation_list:
        - gripper
        - scene
        - state

      camera_topic_list:
        - gripper:/gripper/image_raw/compressed
        - scene:/scene/image_raw/compressed

      joint_topic_list:
        - follower:/joint_states
        - leader:/leader/joint_trajectory

      joint_list:
        - leader

      joint_order:
        leader:
          - joint1
          - joint2
          - joint3
          - joint4
          - joint5
          - gripper_joint_1

      safety_envelope:
        joint_min: [-3.141592653589793, -1.5707963267948966, -1.5707963267948966, -3.141592653589793, -3.141592653589793, -1.0]
        joint_max: [3.141592653589793, 1.5707963267948966, 1.5707963267948966, 3.141592653589793, 3.141592653589793, 1.0]
        max_delta_per_tick_at_30hz: [0.3, 0.3, 0.3, 0.3, 0.3, 0.3]
