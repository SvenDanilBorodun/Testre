[boot]
# WSL's systemd=true flag is unreliable for custom-imported rootfs (PID 1 stays
# at WSL's init instead of systemd). Launch dockerd directly via a small
# wrapper script — same effect, none of the boot-time ambiguity.
command=/usr/local/bin/start-dockerd.sh

[user]
default=root

[network]
generateResolvConf=true
hostname=edubotics

[interop]
enabled=true
appendWindowsPath=false
